.artwork-photo.fade-out {

}
    .caption-block {

    }
.featured-title {

  color: #666;

}
    /* Artwork Caption */
    .caption {
  max-width: 320px;
  color: #444;
  font-size: 0.8em;

}

.caption.fade-out {

}
    .caption em {

    }
    .slideshow-dots {

}

.dot {
  width: 8px;

.dot.active {

    /* Hide mobile UI on desktop */

}

      }

      }

        opacity: 1;

      }
      .mobile-nav a {
        display: block;
        padding: 0.9em 0;
        font-size: 1em;
        color: #444;

      }

        <h2 class="featured-title">Featured Works</h2>

  <img id="slideshowImage" src="images/tulips.jpg" alt="Tulips, oil on canvas, 2024" class="artwork-photo">
  <div id="slideshowDots" class="slideshow-dots"></div>
  <div class="caption-block">
    <figcaption id="slideshowCaption" class="caption">
      <em>Tulips</em>, 2024.<br>

    </figcaption>

</div>
    </div>

  <!-- Script -->
  <script>
  const toggleBtn = document.getElementById('menuToggle');
  const mobileNav = document.getElementById('mobileMenu');

  toggleBtn.addEventListener('click', () => {
    const isOpen = mobileNav.classList.contains('open');
    mobileNav.classList.toggle('open');
    toggleBtn.innerHTML = isOpen ? '&#9776;' : '&times;';
  });

  const artworks = [
    {
      src: 'images/tulips.jpg',
      alt: 'Tulips, oil on canvas, 2024',
      caption: '<em>Tulips</em>, 2024.<br>Oil on canvas, 18 x 20 inches.'
    },
    {
      src: 'images/Johnny Nguyen-1.jpg',
      alt: 'Entangled in What Let You Go, 2026',
      caption: '<em>Entangled in What Let You Go</em>, 2026.<br>Acrylic on canvas, 40 x 40 inches.<br>Currently displayed at the Waidner Spahr Library, Dickinson College, Carlisle, PA.'
    },
    {
      src: 'images/IMG_7319.jpg',
      alt: 'No Rest Under Their Gaze, 2025',
      caption: '<em>No Rest Under Their Gaze</em>, 2025.<br>Oil on canvas.'
    }
  ];

  artworks.forEach(art => {
  const img = new Image();
  img.src = art.src;
});
  let currentArtwork = 0;

  const slideshowImage = document.getElementById('slideshowImage');
  const slideshowCaption = document.getElementById('slideshowCaption');

const slideshowDots = document.getElementById('slideshowDots');
let slideshowInterval;

artworks.forEach((art, index) => {
  const dot = document.createElement('button');
  dot.classList.add('dot');

  if (index === 0) {
    dot.classList.add('active');
  }

  dot.addEventListener('click', () => {
    goToArtwork(index);
    resetSlideshow();
  });

  slideshowDots.appendChild(dot);
});

function updateDots() {
  const dots = document.querySelectorAll('.dot');

  dots.forEach((dot, index) => {
    dot.classList.toggle('active', index === currentArtwork);
  });
}

function goToArtwork(index) {
  slideshowImage.classList.add("fade-out");
  slideshowCaption.classList.add("fade-out");

  setTimeout(() => {
    currentArtwork = index;

    slideshowImage.src = artworks[currentArtwork].src;
    slideshowImage.alt = artworks[currentArtwork].alt;
    slideshowCaption.innerHTML = artworks[currentArtwork].caption;

    updateDots();

    slideshowImage.classList.remove("fade-out");
    slideshowCaption.classList.remove("fade-out");
  }, 1200);
}

function nextArtwork() {
  const nextIndex = (currentArtwork + 1) % artworks.length;
  goToArtwork(nextIndex);
}

function resetSlideshow() {
  clearInterval(slideshowInterval);
  slideshowInterval = setInterval(nextArtwork, 8000);
}

slideshowInterval = setInterval(nextArtwork, 8000);
</script>

</body>
